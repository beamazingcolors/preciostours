<!DOCTYPE html>
<html lang="es" class="h-full bg-slate-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Precio reporte</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Google Fonts Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#f0fdfa',
                            100: '#ccfbf1',
                            500: '#14b8a6',
                            600: '#0d9488',
                            700: '#0f766e',
                            800: '#115e59',
                            900: '#134e4a',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f5f9;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>
<body class="min-h-full flex flex-col font-sans text-slate-800 bg-slate-50/80 antialiased selection:bg-brand-500 selection:text-white">

    <!-- Non-sticky header as requested -->
    <header class="bg-white border-b border-slate-200/80 shadow-2xs">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
            <div class="flex items-center justify-center sm:justify-start">
                <div class="flex items-center space-x-3">
                    <div class="p-2 bg-gradient-to-br from-brand-50 to-teal-100 text-brand-700 rounded-xl border border-brand-200/80 shadow-2xs">
                        <i data-lucide="ticket" class="w-5 h-5"></i>
                    </div>
                    <h1 class="text-xl sm:text-2xl font-extrabold text-slate-900 tracking-tight">Precio reporte</h1>
                </div>
            </div>
        </div>
    </header>

    <main class="flex-grow max-w-7xl w-full mx-auto px-3 sm:px-6 lg:px-8 py-4 sm:py-6 space-y-4">

        <!-- Search and Controls Bar -->
        <section class="bg-white rounded-2xl border border-slate-200/80 p-3.5 sm:p-5 shadow-2xs transition-all">
            <div class="flex flex-col sm:flex-row gap-3 items-center justify-center">
                <!-- Search Input -->
                <div class="relative flex-grow w-full">
                    <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-slate-400">
                        <i data-lucide="search" class="w-4 h-4"></i>
                    </div>
                    <input type="text" id="searchInput" oninput="applyFilters()" placeholder="Buscar por servicio, operador o nota..." class="w-full pl-10 pr-10 py-2.5 bg-slate-50/80 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:bg-white transition-all shadow-inner">
                    <button id="btnClearSearch" onclick="clearSearch()" class="hidden absolute inset-y-0 right-0 pr-3 flex items-center text-slate-400 hover:text-slate-600 cursor-pointer">
                        <i data-lucide="x" class="w-4 h-4"></i>
                    </button>
                </div>

                <!-- Dropdown & Sort Grid -->
                <div class="grid grid-cols-2 gap-2 w-full sm:w-auto shrink-0">
                    <!-- Dropdown Operador -->
                    <div>
                        <select id="filterOperator" onchange="applyFilters()" class="w-full py-2.5 px-3 bg-slate-50/80 border border-slate-200 rounded-xl text-xs font-semibold text-slate-700 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:bg-white transition-all cursor-pointer">
                            <option value="">Todos los Operadores</option>
                        </select>
                    </div>

                    <!-- Dropdown Ordenar -->
                    <div>
                        <select id="sortBy" onchange="applyFilters()" class="w-full py-2.5 px-3 bg-slate-50/80 border border-slate-200 rounded-xl text-xs font-semibold text-slate-700 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:bg-white transition-all cursor-pointer">
                            <option value="name_asc">Ordenar: A - Z</option>
                            <option value="name_desc">Ordenar: Z - A</option>
                            <option value="price_asc">Precio: Menor a Mayor</option>
                            <option value="price_desc">Precio: Mayor a Menor</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Active Stats and Layout Switcher -->
            <div class="flex items-center justify-between gap-2 mt-3.5 pt-3 border-t border-slate-100 text-xs">
                <span id="resultsCount" class="font-semibold text-slate-700">Cargando servicios...</span>

                <div class="flex items-center gap-2">
                    <!-- View Mode Toggle: Default List View -->
                    <div class="flex bg-slate-100 p-0.5 rounded-lg border border-slate-200">
                        <button id="btnLayoutList" onclick="setLayoutMode('list')" class="px-2.5 py-1 rounded-md font-medium text-xs flex items-center gap-1.5 transition-all cursor-pointer bg-white text-slate-800 shadow-2xs">
                            <i data-lucide="list" class="w-3.5 h-3.5"></i>
                            <span class="hidden sm:inline">Lista</span>
                        </button>
                        <button id="btnLayoutGrid" onclick="setLayoutMode('grid')" class="px-2.5 py-1 rounded-md font-medium text-xs flex items-center gap-1.5 transition-all cursor-pointer text-slate-600 hover:text-slate-900">
                            <i data-lucide="grid" class="w-3.5 h-3.5"></i>
                            <span class="hidden sm:inline">Cuadrícula</span>
                        </button>
                    </div>
                </div>
            </div>
        </section>

        <section id="contentArea" class="space-y-4">
            <!-- Loading State -->
            <div id="loadingState" class="bg-white rounded-2xl border border-slate-200 p-10 text-center shadow-2xs">
                <div class="inline-flex items-center justify-center p-3 bg-brand-50 text-brand-600 rounded-full mb-3 animate-spin">
                    <i data-lucide="loader-2" class="w-7 h-7"></i>
                </div>
                <h3 class="text-sm font-semibold text-slate-800">Cargando reporte de precios...</h3>
            </div>

            <!-- Dynamic Services Content -->
            <div id="dynamicList" class="space-y-4 hidden"></div>

            <!-- Empty Results State -->
            <div id="emptyState" class="hidden bg-white rounded-2xl border border-slate-200 p-10 text-center shadow-2xs">
                <div class="inline-flex items-center justify-center p-3 bg-slate-100 text-slate-400 rounded-full mb-2">
                    <i data-lucide="search-x" class="w-7 h-7"></i>
                </div>
                <h3 class="text-sm font-semibold text-slate-800">No se encontraron resultados</h3>
                <p class="text-xs text-slate-500 mt-1">Intenta con otros términos o limpia los filtros.</p>
                <button onclick="resetFilters()" class="mt-3 inline-flex items-center gap-1 px-3.5 py-1.5 rounded-xl bg-brand-600 text-white font-medium text-xs hover:bg-brand-700 transition-colors shadow-2xs cursor-pointer">
                    <i data-lucide="rotate-ccw" class="w-3.5 h-3.5"></i>
                    <span>Restablecer</span>
                </button>
            </div>
        </section>
    </main>

    <!-- Modal for Detailed View -->
    <div id="detailModal" onclick="handleBackdropClick(event)" class="fixed inset-0 bg-slate-900/60 backdrop-blur-xs z-50 flex items-center justify-center p-3 sm:p-4 hidden transition-opacity">
        <div id="modalContainer" class="bg-white rounded-2xl max-w-lg w-full max-h-[90vh] overflow-y-auto shadow-2xl border border-slate-200 flex flex-col">
            <!-- Modal Header -->
            <div class="p-4 sm:p-5 border-b border-slate-100 flex items-start justify-between bg-slate-50/60">
                <div class="pr-3">
                    <span id="modalOperator" class="inline-block px-2.5 py-0.5 rounded-md text-xs font-semibold bg-brand-100 text-brand-800 mb-1">--</span>
                    <h2 id="modalTitle" class="text-base sm:text-lg font-bold text-slate-900 leading-snug">--</h2>
                </div>
                <button onclick="closeModal()" class="p-1.5 rounded-lg text-slate-400 hover:text-slate-600 hover:bg-slate-100 transition-colors cursor-pointer shrink-0">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>

            <!-- Modal Body -->
            <div class="p-4 sm:p-5 space-y-4 text-sm flex-grow">
                <!-- Prices Row -->
                <div class="grid grid-cols-2 gap-3 p-4 bg-slate-50/80 rounded-xl border border-slate-200/80 shadow-inner text-center">
                    <div class="border-r border-slate-200/60 pr-2">
                        <span class="text-xs text-slate-500 uppercase tracking-wider block font-semibold mb-1">Adultos</span>
                        <span id="modalPriceAdult" class="text-lg sm:text-xl font-extrabold text-brand-700 block">--</span>
                    </div>
                    <div class="pl-2">
                        <span class="text-xs text-slate-500 uppercase tracking-wider block font-semibold mb-1">Niños</span>
                        <span id="modalPriceChild" class="text-base sm:text-lg font-bold text-slate-700 block">--</span>
                    </div>
                </div>

                <!-- Notes Section with combined single "Nota" -->
                <div id="modalNotesContainer" class="hidden space-y-2.5">
                    <div id="modalNoteBox" class="bg-amber-50/90 border border-amber-200/80 p-3.5 rounded-xl shadow-2xs">
                        <div class="flex items-center gap-1.5 text-amber-800 font-bold text-xs mb-1">
                            <span class="px-1.5 py-0.5 rounded bg-amber-200 text-amber-900 font-extrabold text-[10px]">Nota</span>
                            <span>Anotaciones del servicio</span>
                        </div>
                        <p id="modalNoteText" class="text-xs text-amber-950 leading-relaxed font-medium whitespace-pre-line"></p>
                    </div>
                </div>
            </div>

            <!-- Modal Footer -->
            <div class="p-3.5 border-t border-slate-100 bg-slate-50 flex items-center justify-end">
                <button onclick="closeModal()" class="px-4 py-2 rounded-xl bg-slate-800 text-white font-medium text-xs hover:bg-slate-900 transition-colors cursor-pointer">
                    Cerrar
                </button>
            </div>
        </div>
    </div>

    <script>
        const GOOGLE_SHEET_TSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTRgSNzAQ8irxoShAvGMtNHeRGQz-HPDmFfUC9dqcLQtDSBp0jQMrIgt8WeGgqB1JDpsMMEkue1YBGm/pub?output=tsv';

        // Fallback Dataset in case fetch is restricted or offline
        const FALLBACK_DATA = [
            { Operador: "Aqua World", Servicio: "Jungle Tour Aqua Ray", PrecioAdulto: "75", PrecioNino: "45", Moneda: "USD", Nota1: "Incluye speed boat y snorkel en arrecife Nizuc", Nota2: "Impuesto de marina $15 USD no incluido" },
            { Operador: "Aqua World", Servicio: "Snorkel en Museo Subacuático (MUSA)", PrecioAdulto: "58", PrecioNino: "38", Moneda: "USD", Nota1: "Equipo de snorkel completo y chaleco salvavidas", Nota2: "No recomendado para embarazadas" },
            { Operador: "Aqua World", Servicio: "Flyboard Experience (20 min)", PrecioAdulto: "110", PrecioNino: "", Moneda: "USD", Nota1: "Instrucción previa por guías certificados", Nota2: "Edad mínima 12 años" },
            
            { Operador: "Grupo Xcaret", Servicio: "Xcaret Plus con Transportación", PrecioAdulto: "189.99", PrecioNino: "94.99", Moneda: "USD", Nota1: "Incluye comida buffet, casillero y show nocturno México Espectacular", Nota2: "Niños de 5 a 11 años pagan tarifa de niño" },
            { Operador: "Grupo Xcaret", Servicio: "Xel-Há All Inclusive", PrecioAdulto: "129.99", PrecioNino: "64.99", Moneda: "USD", Nota1: "Barra libre ilimitada y bufés de comida", Nota2: "Uso de snorkel con tubo de regalo" },
            { Operador: "Grupo Xcaret", Servicio: "Xplor Fuego Night Tour", PrecioAdulto: "149.99", PrecioNino: "74.99", Moneda: "USD", Nota1: "Circuitos de tirolesas nocturnas, autos anfibios y cena buffet", Nota2: "Llevar calzado para agua obligatorio" },
            { Operador: "Grupo Xcaret", Servicio: "Xenses Park", PrecioAdulto: "99.99", PrecioNino: "49.99", Moneda: "USD", Nota1: "Recorrido sensorial medio día con más de 15 actividades", Nota2: "Transportación opcional con costo extra" },
            
            { Operador: "Cancun Adventures", Servicio: "Chichén Itzá Deluxe Tour", PrecioAdulto: "139", PrecioNino: "99", Moneda: "USD", Nota1: "Guía bilingüe certificado, comida buffet y visita a cenote sagrado", Nota2: "Impuesto estatal de vestigios incluido" },
            { Operador: "Cancun Adventures", Servicio: "Tulum & Coba Maya Ruins Expedition", PrecioAdulto: "149", PrecioNino: "109", Moneda: "USD", Nota1: "Subida a pirámide de Coba y comida regional", Nota2: "No incluye renta de bicicletas en Coba" },
            { Operador: "Cancun Adventures", Servicio: "Akumal Turtle Snorkel & Cenote", PrecioAdulto: "119", PrecioNino: "89", Moneda: "USD", Nota1: "Nado con tortugas marinas en hábitat natural", Nota2: "Grupos reducidos max 10 personas" },
            
            { Operador: "Ultramar / Sailing", Servicio: "Catamarán Luxury a Isla Mujeres", PrecioAdulto: "85", PrecioNino: "55", Moneda: "USD", Nota1: "Barra libre nacional, lunch buffet en club de playa y snorkel", Nota2: "Muelle $20 USD se paga al abordar" },
            { Operador: "Ultramar / Sailing", Servicio: "Ferry Isla Mujeres (Boleto Redondo)", PrecioAdulto: "31", PrecioNino: "21", Moneda: "USD", Nota1: "Salidas cada 30 minutos desde Puerto Juárez", Nota2: "Válido por 6 meses" },
            
            { Operador: "Captain Hook", Servicio: "Galeón Pirata & Dinner Show", PrecioAdulto: "115", PrecioNino: "57.50", Moneda: "USD", Nota1: "Cena de corte New York o langosta con show de batallas piratas", Nota2: "Impuesto portuario no incluido ($15 USD)" },
            { Operador: "Captain Hook", Servicio: "El Pirata de Cancún - Show Familiar", PrecioAdulto: "95", PrecioNino: "47.50", Moneda: "USD", Nota1: "Barra libre, concursos y fuegos artificiales", Nota2: "Niños menores de 4 años gratis" }
        ];

        let rawServicesData = [];
        let filteredServicesData = [];
        let expandedOperators = new Set();
        let currentLayout = 'list'; // Default to List view

        async function fetchTSVData() {
            try {
                const response = await fetch(GOOGLE_SHEET_TSV_URL);
                if (!response.ok) throw new Error('Network error fetching TSV');
                const tsvText = await response.text();
                const parsed = parseTSV(tsvText);
                
                if (parsed && parsed.length > 0) {
                    rawServicesData = parsed;
                } else {
                    rawServicesData = FALLBACK_DATA;
                }
            } catch (error) {
                console.warn('Could not load live TSV (using fallback data):', error);
                rawServicesData = FALLBACK_DATA;
            } finally {
                initAppWithData();
            }
        }

        function parseTSV(tsvText) {
            const lines = tsvText.split(/\r?\n/).filter(line => line.trim().length > 0);
            if (lines.length < 2) return [];
            
            const headers = lines[0].split('\t').map(h => h.trim().toLowerCase());
            
            const idxOperador = headers.findIndex(h => h.includes('operador') || h.includes('operator'));
            const idxServicio = headers.findIndex(h => h.includes('servicio') || h.includes('actividad') || h.includes('nombre') || h.includes('tour'));
            const idxPrecioAdulto = headers.findIndex(h => h.includes('adulto') || h.includes('precioadulto'));
            const idxPrecioNino = headers.findIndex(h => h.includes('niño') || h.includes('nino') || h.includes('precionino'));
            const idxMoneda = headers.findIndex(h => h.includes('moneda') || h.includes('curr'));
            
            // Gather all indices that could contain notes (nota 1, nota 2, nota, observaciones, etc.)
            const noteIndices = [];
            headers.forEach((h, idx) => {
                if (h.includes('nota') || h.includes('observac') || h.includes('comentar') || h.includes('inclusi') || h.includes('detalle')) {
                    noteIndices.push(idx);
                }
            });

            const results = [];
            for (let i = 1; i < lines.length; i++) {
                const cols = lines[i].split('\t');
                if (cols.length === 0) continue;

                const operatorVal = idxOperador !== -1 && cols[idxOperador] ? cols[idxOperador].trim() : 'General';
                const serviceVal = idxServicio !== -1 && cols[idxServicio] ? cols[idxServicio].trim() : '';

                if (!serviceVal && !operatorVal) continue;

                // Collect all note text for this row
                const notesList = [];
                noteIndices.forEach(idx => {
                    if (cols[idx] && cols[idx].trim().length > 0) {
                        const val = cols[idx].trim();
                        if (!notesList.includes(val)) {
                            notesList.push(val);
                        }
                    }
                });

                results.push({
                    Operador: operatorVal || 'General',
                    Servicio: serviceVal || 'Servicio Sin Nombre',
                    PrecioAdulto: idxPrecioAdulto !== -1 && cols[idxPrecioAdulto] ? cols[idxPrecioAdulto].trim() : '',
                    PrecioNino: idxPrecioNino !== -1 && cols[idxPrecioNino] ? cols[idxPrecioNino].trim() : '',
                    Moneda: idxMoneda !== -1 && cols[idxMoneda] ? cols[idxMoneda].trim() : 'USD',
                    Nota: notesList.join(' • ')
                });
            }
            return results;
        }

        function initAppWithData() {
            // Process and combine notes if not already combined
            rawServicesData.forEach(item => {
                if (!item.Nota) {
                    const notes = [item.Nota1, item.Nota2].filter(n => n && n.trim().length > 0);
                    item.Nota = notes.join(' • ');
                }
            });

            // Populate Operator Select Dropdown
            const operatorsSet = new Set();
            rawServicesData.forEach(item => {
                if (item.Operador) operatorsSet.add(item.Operador.trim());
            });

            const sortedOperators = Array.from(operatorsSet).sort((a, b) => a.localeCompare(b));
            const selectOp = document.getElementById('filterOperator');
            
            // Clear previous items except default
            selectOp.innerHTML = '<option value="">Todos los Operadores</option>';
            sortedOperators.forEach(op => {
                const opt = document.createElement('option');
                opt.value = op;
                opt.textContent = op;
                selectOp.appendChild(opt);
            });

            // Expand all operators by default for full listing visibility
            expandedOperators = new Set(sortedOperators);

            // Hide Loading State and Show Dynamic List
            document.getElementById('loadingState').classList.add('hidden');
            document.getElementById('dynamicList').classList.remove('hidden');

            applyFilters();
        }

        function applyFilters() {
            const query = (document.getElementById('searchInput').value || '').toLowerCase().trim();
            const selectedOp = document.getElementById('filterOperator').value;
            const sortBy = document.getElementById('sortBy').value;

            // Toggle clear search button visibility
            const btnClear = document.getElementById('btnClearSearch');
            if (query) {
                btnClear.classList.remove('hidden');
            } else {
                btnClear.classList.add('hidden');
            }

            // Filter data
            filteredServicesData = rawServicesData.filter(item => {
                // Search query match across Servicio, Operador, Nota
                const matchQuery = !query || 
                    (item.Servicio || '').toLowerCase().includes(query) ||
                    (item.Operador || '').toLowerCase().includes(query) ||
                    (item.Nota || '').toLowerCase().includes(query);

                // Operator filter match
                const matchOp = !selectedOp || item.Operador === selectedOp;

                return matchQuery && matchOp;
            });

            // Sort data
            filteredServicesData.sort((a, b) => {
                if (sortBy === 'name_asc') {
                    return (a.Servicio || '').localeCompare(b.Servicio || '');
                } else if (sortBy === 'name_desc') {
                    return (b.Servicio || '').localeCompare(a.Servicio || '');
                } else if (sortBy === 'price_asc') {
                    const pA = parseFloat((a.PrecioAdulto || '0').replace(/[^0-9.]/g, '')) || 0;
                    const pB = parseFloat((b.PrecioAdulto || '0').replace(/[^0-9.]/g, '')) || 0;
                    return pA - pB;
                } else if (sortBy === 'price_desc') {
                    const pA = parseFloat((a.PrecioAdulto || '0').replace(/[^0-9.]/g, '')) || 0;
                    const pB = parseFloat((b.PrecioAdulto || '0').replace(/[^0-9.]/g, '')) || 0;
                    return pB - pA;
                }
                return 0;
            });

            renderList();
        }

        function clearSearch() {
            document.getElementById('searchInput').value = '';
            applyFilters();
        }

        function resetFilters() {
            document.getElementById('searchInput').value = '';
            document.getElementById('filterOperator').value = '';
            document.getElementById('sortBy').value = 'name_asc';
            applyFilters();
        }

        function setLayoutMode(mode) {
            currentLayout = mode;
            const btnGrid = document.getElementById('btnLayoutGrid');
            const btnList = document.getElementById('btnLayoutList');

            if (mode === 'grid') {
                btnGrid.className = 'px-2.5 py-1 rounded-md font-medium text-xs flex items-center gap-1.5 transition-all cursor-pointer bg-white text-slate-800 shadow-2xs';
                btnList.className = 'px-2.5 py-1 rounded-md font-medium text-xs flex items-center gap-1.5 transition-all cursor-pointer text-slate-600 hover:text-slate-900';
            } else {
                btnList.className = 'px-2.5 py-1 rounded-md font-medium text-xs flex items-center gap-1.5 transition-all cursor-pointer bg-white text-slate-800 shadow-2xs';
                btnGrid.className = 'px-2.5 py-1 rounded-md font-medium text-xs flex items-center gap-1.5 transition-all cursor-pointer text-slate-600 hover:text-slate-900';
            }

            renderList();
        }

        function getOperatorIconSVG(name) {
            const icons = [
                // Pirámide estilo Chichén Itzá
                `<svg class="w-5 h-5 text-brand-700" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 21h20L12 3z"/><path d="M7 21v-3h10v3"/><path d="M9 14h6"/><path d="M10 10h4"/></svg>`,
                // Palmera Caribeña
                `<svg class="w-5 h-5 text-brand-700" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22v-9"/><path d="M12 13c-2-3-6-3-8-1 2-2 6-1 8 1z"/><path d="M12 13c2-3 6-3 8-1-2-2-6-1-8 1z"/><path d="M12 10C9 7 5 8 4 10c2-1 6 0 8 0z"/><path d="M12 10c3-3 7-2 8 0-2-1-6 0-8 0z"/></svg>`,
                // Olas de Mar / Cenote
                `<svg class="w-5 h-5 text-brand-700" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 6c.6.5 1.2 1 2.5 1C7 7 7 5 9.5 5c2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1"/><path d="M2 12c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2 2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1"/><path d="M2 18c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2 2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1"/></svg>`,
                // Templo Maya de Tulum
                `<svg class="w-5 h-5 text-brand-700" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21h18"/><path d="M5 21V11h14v10"/><path d="M9 11V7h6v4"/><path d="M10 7V4h4v3"/><path d="M9 21v-5h6v5"/></svg>`,
                // Sol Caribeño
                `<svg class="w-5 h-5 text-brand-700" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>`,
                // Velero / Catamarán
                `<svg class="w-5 h-5 text-brand-700" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 18H2l3-7h14l3 7z"/><path d="M12 11V3l8 8H12z"/><path d="M10 11V5L3 11h7z"/></svg>`
            ];

            let hash = 0;
            const str = name || 'General';
            for (let i = 0; i < str.length; i++) {
                hash = str.charCodeAt(i) + ((hash << 5) - hash);
            }
            const idx = Math.abs(hash) % icons.length;
            return icons[idx];
        }

        function renderList() {
            const listEl = document.getElementById('dynamicList');
            const emptyEl = document.getElementById('emptyState');
            const countEl = document.getElementById('resultsCount');

            if (!filteredServicesData || filteredServicesData.length === 0) {
                listEl.classList.add('hidden');
                emptyEl.classList.remove('hidden');
                countEl.textContent = '0 servicios encontrados';
                return;
            }

            emptyEl.classList.add('hidden');
            listEl.classList.remove('hidden');

            const total = filteredServicesData.length;
            countEl.textContent = `${total} servicio${total !== 1 ? 's' : ''} disponible${total !== 1 ? 's' : ''}`;

            // Group items by Operador
            const grouped = {};
            filteredServicesData.forEach(item => {
                const op = item.Operador || 'General';
                if (!grouped[op]) grouped[op] = [];
                grouped[op].push(item);
            });

            let html = '';
            const operators = Object.keys(grouped);

            operators.forEach((opName) => {
                const items = grouped[opName];
                const iconSvg = getOperatorIconSVG(opName);

                html += `
                    <div class="bg-white rounded-2xl border border-slate-200/80 shadow-2xs overflow-hidden transition-all">
                        <!-- Group Header -->
                        <div class="p-3.5 sm:p-4 bg-slate-50/90 border-b border-slate-100 flex items-center justify-between">
                            <div class="flex items-center space-x-3">
                                <div class="p-2 bg-brand-50 text-brand-700 rounded-xl border border-brand-200/60 flex items-center justify-center shrink-0">
                                    ${iconSvg}
                                </div>
                                <div>
                                    <h3 class="text-sm sm:text-base font-bold text-slate-900 tracking-tight">${escapeHtml(opName)}</h3>
                                    <span class="text-[11px] font-semibold text-slate-500">${items.length} servicio${items.length !== 1 ? 's' : ''}</span>
                                </div>
                            </div>
                        </div>

                        <!-- Group Items Content -->
                        <div class="p-3 sm:p-4 bg-white">
                            ${currentLayout === 'grid' 
                                ? `<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3.5">${items.map(item => renderGridCard(item)).join('')}</div>`
                                : `<div class="space-y-2.5">${items.map(item => renderListItem(item)).join('')}</div>`
                            }
                        </div>
                    </div>
                `;
            });

            listEl.innerHTML = html;

            if (window.lucide) {
                lucide.createIcons();
            }
        }

        function renderGridCard(item) {
            const priceAd = formatPrice(item.PrecioAdulto, item.Moneda);
            const priceCh = formatPrice(item.PrecioNino, item.Moneda);

            return `
                <div onclick="openDetailModal(${JSON.stringify(item).replace(/"/g, '&quot;')})" class="bg-white rounded-xl border border-slate-200/90 hover:border-brand-500 p-4 flex flex-col justify-between hover:shadow-md transition-all cursor-pointer group">
                    <div>
                        <h4 class="text-sm font-bold text-slate-900 group-hover:text-brand-700 transition-colors line-clamp-2">
                            ${escapeHtml(item.Servicio)}
                        </h4>
                    </div>

                    <div class="mt-3 pt-3 border-t border-slate-100 flex items-center justify-between">
                        <div class="space-y-0.5">
                            ${priceAd ? `
                            <div class="flex items-center gap-1.5 text-xs font-semibold text-slate-700">
                                <span class="text-[11px] text-slate-400 font-medium">Adultos:</span>
                                <span class="text-sm sm:text-base font-extrabold text-brand-700">${priceAd}</span>
                            </div>` : ''}
                            ${priceCh ? `
                            <div class="flex items-center gap-1.5 text-[11px] font-medium text-slate-600">
                                <span class="text-[10px] text-slate-400">Niños:</span>
                                <span class="font-bold text-slate-700">${priceCh}</span>
                            </div>` : ''}
                        </div>
                        <div class="p-1.5 rounded-lg bg-slate-50 border border-slate-200 text-slate-400 group-hover:bg-brand-600 group-hover:text-white group-hover:border-brand-600 transition-all shrink-0">
                            <i data-lucide="chevron-right" class="w-4 h-4"></i>
                        </div>
                    </div>

                    <!-- Single Combined Nota placed at the bottom -->
                    ${item.Nota ? `
                        <div class="mt-2.5 pt-2 border-t border-slate-100/80 flex items-start gap-1.5 text-[11px] font-medium text-amber-950">
                            <span class="font-extrabold text-amber-800 shrink-0 text-[10px] bg-amber-100 px-1.5 py-0.5 rounded border border-amber-200">Nota</span>
                            <span class="line-clamp-2 leading-relaxed">${escapeHtml(item.Nota)}</span>
                        </div>
                    ` : ''}
                </div>
            `;
        }

        function renderListItem(item) {
            const priceAd = formatPrice(item.PrecioAdulto, item.Moneda);
            const priceCh = formatPrice(item.PrecioNino, item.Moneda);

            return `
                <div onclick="openDetailModal(${JSON.stringify(item).replace(/"/g, '&quot;')})" class="bg-white rounded-xl border border-slate-200/90 hover:border-brand-500 p-3.5 sm:px-4 flex flex-col justify-between hover:shadow-2xs transition-all cursor-pointer group gap-2.5">
                    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-2">
                        <div class="flex-grow min-w-0">
                            <h4 class="text-xs sm:text-sm font-bold text-slate-900 group-hover:text-brand-700 transition-colors">
                                ${escapeHtml(item.Servicio)}
                            </h4>
                        </div>

                        <div class="text-left sm:text-right shrink-0 border-t sm:border-t-0 pt-1.5 sm:pt-0 border-slate-100 flex sm:flex-col items-center sm:items-end justify-between sm:justify-center gap-2">
                            ${priceAd ? `
                            <div class="flex items-center gap-1 text-xs sm:text-sm font-extrabold text-brand-700">
                                <span class="text-[10px] sm:text-xs font-semibold text-slate-400">Adultos:</span>
                                <span>${priceAd}</span>
                            </div>` : ''}
                            ${priceCh ? `
                            <div class="flex items-center gap-1 text-[11px] sm:text-xs font-medium text-slate-600">
                                <span class="text-[10px] font-normal text-slate-400">Niños:</span>
                                <span class="font-bold text-slate-700">${priceCh}</span>
                            </div>` : ''}
                        </div>
                    </div>

                    <!-- Single Combined Nota placed at the bottom -->
                    ${item.Nota ? `
                        <div class="pt-2 border-t border-slate-100/80 flex items-start gap-1.5 text-[11px] text-amber-950 font-medium">
                            <span class="font-extrabold text-amber-800 text-[10px] bg-amber-100 px-1.5 py-0.5 rounded border border-amber-200 shrink-0">Nota</span>
                            <span class="leading-relaxed">${escapeHtml(item.Nota)}</span>
                        </div>
                    ` : ''}
                </div>
            `;
        }

        function openDetailModal(item) {
            document.getElementById('modalOperator').textContent = item.Operador || 'Operador';
            document.getElementById('modalTitle').textContent = item.Servicio || '';

            const pAdult = formatPrice(item.PrecioAdulto, item.Moneda);
            const pChild = formatPrice(item.PrecioNino, item.Moneda);

            document.getElementById('modalPriceAdult').textContent = pAdult || 'No especificado';
            document.getElementById('modalPriceChild').textContent = pChild || 'No especificado';

            const notesContainer = document.getElementById('modalNotesContainer');
            const noteTextEl = document.getElementById('modalNoteText');

            if (item.Nota && item.Nota.trim() !== '') {
                noteTextEl.textContent = item.Nota;
                notesContainer.classList.remove('hidden');
            } else {
                notesContainer.classList.add('hidden');
            }

            document.getElementById('detailModal').classList.remove('hidden');
            if (window.lucide) lucide.createIcons();
        }

        function closeModal() {
            document.getElementById('detailModal').classList.add('hidden');
        }

        function handleBackdropClick(event) {
            if (event.target.id === 'detailModal') {
                closeModal();
            }
        }

        // Format clean pricing (no "Consultar" string)
        function formatPrice(val, currency) {
            if (!val || val === '0' || val === '-' || val.trim() === '') return '';
            const num = parseFloat(val.toString().replace(/[^0-9.]/g, ''));
            const currSymbol = (currency || 'USD').toUpperCase();
            if (isNaN(num) || num === 0) return '';
            return `$${num.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })} ${currSymbol}`;
        }

        function escapeHtml(str) {
            if (!str) return '';
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        window.onload = function() {
            if (window.lucide) lucide.createIcons();
            fetchTSVData();
        };
    </script>
</body>
</html>
