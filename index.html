<html lang="es" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarifario Turístico Cancún 2026</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {

                    }

        }

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #fcfcfc;

<body class="min-h-screen flex flex-col justify-between antialiased text-zinc-800 custom-scrollbar">

    <!-- Minimalist Header -->
    <header class="bg-white border-b border-zinc-200 sticky top-0 z-30 shadow-2xs">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 py-3.5 flex items-center justify-between">
            <div class="flex items-center space-x-2.5">
                <div class="w-8 h-8 rounded-lg bg-zinc-900 text-white flex items-center justify-center font-bold text-sm">
                    <i class="fa-solid fa-compass"></i>
                </div>
                <h1 class="text-base sm:text-lg font-bold tracking-tight text-zinc-900">
                    Tarifario Cancún <span class="text-xs font-normal text-zinc-400 ml-1">2026</span>
                </h1>
            </div>

            <!-- Stats Badge -->
            <div class="text-xs text-zinc-500 font-medium bg-zinc-100 px-3 py-1.5 rounded-full border border-zinc-200/80">
                <span id="statTotalTours" class="font-bold text-zinc-900">0</span> actividades
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 sm:px-6 py-6 flex-grow w-full space-y-5">

        <!-- Search & Filter Controls -->
        <div class="flex flex-col md:flex-row gap-3 items-stretch md:items-center justify-between bg-white p-3 rounded-xl border border-zinc-200 shadow-2xs">
            
            <!-- Live Search -->
            <div class="relative flex-grow max-w-md">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-zinc-400 text-xs">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </div>
                <input type="text" id="searchInput" oninput="applyFilters()" placeholder="Buscar tour, parque u operador..." 
                    class="w-full pl-9 pr-8 py-2 bg-zinc-50 border border-zinc-200 rounded-lg text-xs font-medium focus:ring-1 focus:ring-zinc-800 focus:border-zinc-800 outline-none transition placeholder-zinc-400">
                <button id="clearSearchBtn" onclick="clearSearch()" class="hidden absolute inset-y-0 right-0 pr-3 flex items-center text-zinc-400 hover:text-zinc-600 text-xs">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>

            <!-- Filter Dropdowns & View Mode Toggle -->
            <div class="flex items-center gap-2 overflow-x-auto">
                <!-- Operator Select Dropdown -->
                <select id="filterOperator" onchange="applyFilters()" class="py-2 px-3 bg-zinc-50 border border-zinc-200 rounded-lg text-xs font-medium text-zinc-700 focus:ring-1 focus:ring-zinc-800 outline-none transition">
                    <option value="ALL">Todos los Operadores</option>
                </select>

                <!-- Alphabetical Sorting Select -->
                <select id="sortBy" onchange="applyFilters()" class="py-2 px-3 bg-zinc-50 border border-zinc-200 rounded-lg text-xs font-medium text-zinc-700 focus:ring-1 focus:ring-zinc-800 outline-none transition">
                    <option value="OPERATOR_ASC">Operador (A-Z)</option>
                    <option value="OPERATOR_DESC">Operador (Z-A)</option>
                    <option value="TOUR_ASC">Tour / Parque (A-Z)</option>
                    <option value="TOUR_DESC">Tour / Parque (Z-A)</option>
                </select>

                <!-- View Mode Switcher (Lista / Cuadrícula) -->
                <div class="flex items-center border border-zinc-200 rounded-lg p-0.5 bg-zinc-100 shrink-0">
                    <button id="btnViewList" onclick="setViewMode('list')" title="Ver en lista" class="px-2.5 py-1.5 rounded-md text-xs font-medium transition flex items-center gap-1.5 bg-white text-zinc-900 shadow-2xs">
                        <i class="fa-solid fa-list"></i>
                        <span class="hidden sm:inline">Lista</span>
                    </button>
                    <button id="btnViewGrid" onclick="setViewMode('grid')" title="Ver en cuadrícula" class="px-2.5 py-1.5 rounded-md text-xs font-medium transition flex items-center gap-1.5 text-zinc-500 hover:text-zinc-900">
                        <i class="fa-solid fa-border-all"></i>
                        <span class="hidden sm:inline">Cuadrícula</span>
                    </button>
                </div>
            </div>

        </div>

        <!-- Main Content Container -->
        <section id="mainViewContainer" class="space-y-4">
            <!-- Content dynamically injected here -->
        </section>

    </main>

    <!-- Detail Modal for Expanded View -->
    <div id="tourDetailModal" class="fixed inset-0 bg-zinc-900/50 backdrop-blur-xs z-50 hidden flex items-center justify-center p-4" onclick="handleBackdropClick(event)">
        <div class="bg-white rounded-2xl max-w-lg w-full p-5 sm:p-6 shadow-xl border border-zinc-200 relative animate-in fade-in zoom-in-95 duration-150" onclick="event.stopPropagation()">
            <button onclick="closeTourModal()" class="absolute top-4 right-4 text-zinc-400 hover:text-zinc-700 w-8 h-8 rounded-full flex items-center justify-center bg-zinc-100 hover:bg-zinc-200 transition" title="Cerrar">
                <i class="fa-solid fa-xmark text-sm"></i>
            </button>
            
            <div id="modalBody">
                <!-- Content dynamically injected via JS -->
            </div>
        </div>
    </div>

    <footer class="border-t border-zinc-200 bg-white py-5 text-xs text-zinc-400 mt-10">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 flex flex-col sm:flex-row items-center justify-between gap-2">
            <span>Tarifario Turístico Cancún</span>
            <span id="resultsCountText" class="text-zinc-400">Cargando datos...</span>
        </div>
    </footer>

    <script>
        const DEFAULT_SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTRgSNzAQ8irxoShAvGMtNHeRGQz-HPDmFfUC9dqcLQtDSBp0jQMrIgt8WeGgqB1JDpsMMEkue1YBGm/pub?output=tsv";
        
        let allTours = [];
        let filteredTours = [];
        let currentViewMode = 'list'; // 'list' or 'grid'

        function normalizeStr(str) {
            if (!str) return '';
            return str.toString()
                .toLowerCase()
                .normalize('NFD')
                .replace(/[\u0300-\u036f]/g, '')
                .replace(/[^a-z0-9\s]/g, '')
                .trim();
        }

        function levenshtein(a, b) {
            if (a.length === 0) return b.length;
            if (b.length === 0) return a.length;
            const matrix = [];
            for (let i = 0; i <= b.length; i++) matrix[i] = [i];
            for (let j = 0; j <= a.length; j++) matrix[0][j] = j;
            for (let i = 1; i <= b.length; i++) {
                for (let j = 1; j <= a.length; j++) {
                    if (b.charAt(i - 1) === a.charAt(j - 1)) {
                        matrix[i][j] = matrix[i - 1][j - 1];
                    } else {
                        matrix[i][j] = Math.min(
                            matrix[i - 1][j - 1] + 1,
                            matrix[i][j - 1] + 1,
                            matrix[i - 1][j] + 1
                        );
                    }
                }
            }
            return matrix[b.length][a.length];
        }

        function getFuzzyScore(text, query) {
            const normText = normalizeStr(text);
            const normQuery = normalizeStr(query);
            if (!normQuery) return 100;
            if (!normText) return 0;

            if (normText.includes(normQuery)) return 100;

            const queryWords = normQuery.split(/\s+/);
            const textWords = normText.split(/\s+/);
            let matchedWords = 0;

            for (const qWord of queryWords) {
                if (!qWord) continue;
                let foundMatch = false;
                for (const tWord of textWords) {
                    if (tWord.includes(qWord) || qWord.includes(tWord)) {
                        foundMatch = true;
                        break;
                    }
                    if (qWord.length > 2 && levenshtein(qWord, tWord) <= 2) {
                        foundMatch = true;
                        break;
                    }
                }
                if (foundMatch) matchedWords++;
            }

            return queryWords.length > 0 ? (matchedWords / queryWords.length) * 80 : 0;
        }

        const fallbackCancunData = [
            { id: 1, operador: "Cancún Passion", tour: "4X1 DELUX Tulum, Coba, Cenote, Playa NACIONAL", pasajeroRaw: "Adultos y Menores", intAdulto: "", intMenor: "", nacAdulto: "1,290 MXN", nacMenor: "990 MXN", moneda: "MXN", tc: "", notesList: ["Incluye guía certificado, comida buffet y entrada a cenote.", "No incluye impuesto de muelle ni bebidas."] },
            { id: 2, operador: "Grupo Xcaret", tour: "Xcaret Plus con Transportación", pasajeroRaw: "Adultos y Menores", intAdulto: "189 USD", intMenor: "142 USD", nacAdulto: "2,990 MXN", nacMenor: "2,240 MXN", moneda: "USD", tc: "", notesList: ["Incluye comida buffet y equipo de snorkel.", "Transportación redonda incluida."] },
            { id: 3, operador: "Grupo Xcaret", tour: "Xel-Há All Inclusive", pasajeroRaw: "Adultos y Menores", intAdulto: "139 USD", intMenor: "104 USD", nacAdulto: "2,200 MXN", nacMenor: "1,650 MXN", moneda: "USD", tc: "", notesList: ["Barra libre nacional y snorkel ilimitado."] },
            { id: 4, operador: "Grupo Xcaret", tour: "Xplor Fuego Nocturno", pasajeroRaw: "Adultos y Menores", intAdulto: "129 USD", intMenor: "97 USD", nacAdulto: "", nacMenor: "", moneda: "USD", tc: "", notesList: ["Incluye tirolesas nocturnas y buffet."] },
            { id: 5, operador: "Aquaworld Cancún", tour: "Jungle Tour Express (Speedboat & Snorkel MUSA)", pasajeroRaw: "Adultos y Menores", intAdulto: "75 USD", intMenor: "50 USD", nacAdulto: "1,200 MXN", nacMenor: "800 MXN", moneda: "USD", tc: "20.00", notesList: ["Impuesto de muelle no incluido $20 USD."] },
            { id: 6, operador: "Aquaworld Cancún", tour: "Snorkel en Museo Subacuático MUSA", pasajeroRaw: "Adultos y Menores", intAdulto: "52 USD", intMenor: "38 USD", nacAdulto: "", nacMenor: "", moneda: "USD", tc: "", notesList: ["Impuesto de muelle $20 USD no incluido."] },
            { id: 7, operador: "Marina Sunrise", tour: "Catamarán a Isla Mujeres VIP", pasajeroRaw: "Adultos y Menores", intAdulto: "89 USD", intMenor: "65 USD", nacAdulto: "1,600 MXN", nacMenor: "1,150 MXN", moneda: "USD", tc: "", notesList: ["Open bar a bordo y comida buffet en club de playa.", "Impuesto de muelle $20 USD por persona."] },
            { id: 8, operador: "Captain Hook", tour: "Cena Show Pirata Capitán Hook", pasajeroRaw: "Adultos y Menores", intAdulto: "110 USD", intMenor: "55 USD", nacAdulto: "2,000 MXN", nacMenor: "1,000 MXN", moneda: "MXN", tc: "", notesList: ["Impuesto de muelle $20 USD no incluido."] }
        ];

        function isInvalid(val) {
            if (val === null || val === undefined) return true;
            const str = val.toString().trim().toLowerCase();
            if (str === '' || str === 'n/a' || str === 'na' || str === '-' || str === 'null' || str === 'undefined') return true;

            const cleanNum = str.replace(/[\$\,]/g, '').replace(/\b(usd|mxn)\b/g, '').trim();
            if (cleanNum === '0' || cleanNum === '0.00' || cleanNum === '0.0' || (!isNaN(parseFloat(cleanNum)) && parseFloat(cleanNum) === 0)) {
                return true;
            }

            return false;
        }

        function cleanVal(val) {
            if (isInvalid(val)) return '';
            return val.toString().trim();
        }

        function formatPrice(val, defaultCurrency = '') {
            if (isInvalid(val)) return '';
            let str = val.toString().trim();
            if (!str.includes('$') && !isNaN(parseFloat(str.replace(/,/g, '')))) {
                str = '$' + str;
            }
            const upperStr = str.toUpperCase();
            if (defaultCurrency && !upperStr.includes('USD') && !upperStr.includes('MXN')) {
                str += ' ' + defaultCurrency.toUpperCase();
            }
            return str;
        }

        function parseTSV(tsvText) {
            try {
                const lines = tsvText.split(/\r?\n/).filter(line => line.trim() !== '');
                if (lines.length < 2) return null;

                const rawHeaders = lines[0].split('\t').map(h => h.trim().replace(/^"|"$/g, ''));
                const headers = rawHeaders.map(h => h.toLowerCase());

                const findIdx = (keywords) => headers.findIndex(h => keywords.some(k => h.includes(k)));

                // Dynamic detection for headers
                let idxOp = findIdx(['operador', 'operator', 'empresa', 'proveedor', 'agencia']);
                let idxTour = findIdx(['tour / parque', 'tour/parque', 'tour', 'parque', 'actividad', 'servicio', 'experiencia', 'excursion']);
                let idxPasajero = findIdx(['tipo de pasajero', 'pasajero', 'pax', 'modalidad', 'categoria']);
                
                // Check if sheet has distinct explicit columns for Adulto/Menor Int/Nac
                let idxIntAd = findIdx(['adulto int', 'int adulto', 'extranjero adulto', 'precio adulto', 'adulto', 'adult']);
                let idxIntMn = findIdx(['menor int', 'int menor', 'extranjero menor', 'precio menor', 'precio niño', 'precio nino', 'menor', 'niño', 'nino', 'child']);
                let idxNacAd = findIdx(['adulto nac', 'nac adulto', 'mexicano adulto']);
                let idxNacMn = findIdx(['menor nac', 'nac menor', 'mexicano menor']);

                // Standard group price columns
                let idxInt = findIdx(['precio internacional', 'internacional', 'extranjero', 'int']);
                let idxNac = findIdx(['precio nacional', 'nacional', 'mexicano', 'nac']);
                
                let idxMoneda = findIdx(['moneda', 'currency', 'divisa']);
                let idxTC = findIdx(['tipo de cambio', 'tc', 'exchange', 'cambio']);
                
                let idxNota1 = findIdx(['nota 1', 'notas 1', 'nota1', 'observacion', 'observaciones']);
                let idxNota2 = findIdx(['nota 2', 'notas 2', 'nota2', 'comentario', 'comentarios']);

                // Positional fallbacks based on standard order:
                // [0] Operador | [1] Tour/Parque | [2] Tipo Pasajero | [3] Precio Int | [4] Precio Nac | [5] Moneda | [6] TC | [7] Nota 1 | [8] Nota 2
                if (idxOp < 0) idxOp = 0;
                if (idxTour < 0) idxTour = 1;
                if (idxPasajero < 0) idxPasajero = 2;
                if (idxInt < 0 && idxIntAd < 0) idxInt = 3;
                if (idxNac < 0 && idxNacAd < 0) idxNac = 4;
                if (idxMoneda < 0) idxMoneda = 5;
                if (idxTC < 0) idxTC = 6;
                if (idxNota1 < 0) idxNota1 = 7;
                if (idxNota2 < 0) idxNota2 = 8;

                const mappedIndices = new Set([
                    idxOp, idxTour, idxPasajero, idxInt, idxNac, idxIntAd, idxIntMn, idxNacAd, idxNacMn, idxMoneda, idxTC, idxNota1, idxNota2
                ].filter(i => i >= 0));

                const toursMap = new Map();

                for (let i = 1; i < lines.length; i++) {
                    const cols = lines[i].split('\t').map(c => c.trim().replace(/^"|"$/g, ''));
                    if (cols.length === 0 || cols.every(c => !c)) continue;

                    const op = cleanVal(cols[idxOp]) || 'Operador General';
                    let tour = cleanVal(cols[idxTour]);

                    if (!tour) continue;

                    const pasajeroVal = idxPasajero >= 0 ? cleanVal(cols[idxPasajero]) : '';
                    
                    let intAdulto = idxIntAd >= 0 ? cleanVal(cols[idxIntAd]) : '';
                    let intMenor = idxIntMn >= 0 ? cleanVal(cols[idxIntMn]) : '';
                    let nacAdulto = idxNacAd >= 0 ? cleanVal(cols[idxNacAd]) : '';
                    let nacMenor = idxNacMn >= 0 ? cleanVal(cols[idxNacMn]) : '';

                    const priceIntRaw = idxInt >= 0 ? cleanVal(cols[idxInt]) : '';
                    const priceNacRaw = idxNac >= 0 ? cleanVal(cols[idxNac]) : '';
                    const moneda = idxMoneda >= 0 ? cleanVal(cols[idxMoneda]) : '';
                    const tc = idxTC >= 0 ? cleanVal(cols[idxTC]) : '';

                    const nota1 = idxNota1 >= 0 ? cleanVal(cols[idxNota1]) : '';
                    const nota2 = idxNota2 >= 0 ? cleanVal(cols[idxNota2]) : '';

                    if (!intAdulto && !intMenor && priceIntRaw) {
                        const pasLower = pasajeroVal.toLowerCase();
                        if ((pasLower.includes('menor') || pasLower.includes('niñ') || pasLower.includes('child')) && !pasLower.includes('adult')) {
                            intMenor = priceIntRaw;
                        } else {
                            intAdulto = priceIntRaw;
                        }
                    }

                    if (!nacAdulto && !nacMenor && priceNacRaw) {
                        const pasLower = pasajeroVal.toLowerCase();
                        if ((pasLower.includes('menor') || pasLower.includes('niñ') || pasLower.includes('child')) && !pasLower.includes('adult')) {
                            nacMenor = priceNacRaw;
                        } else {
                            nacAdulto = priceNacRaw;
                        }
                    }

                    const notesList = [];
                    if (nota1 && !isInvalid(nota1)) notesList.push(nota1);
                    if (nota2 && !isInvalid(nota2)) notesList.push(nota2);

                    cols.forEach((colVal, colIdx) => {
                        if (mappedIndices.has(colIdx)) return;
                        const val = cleanVal(colVal);
                        if (!val || isInvalid(val)) return;
                        if (!notesList.includes(val)) {
                            notesList.push(val);
                        }
                    });

                    const mapKey = `${op.toLowerCase()}:::${tour.toLowerCase()}`;

                    if (toursMap.has(mapKey)) {
                        const existing = toursMap.get(mapKey);

                        if (intAdulto && !existing.intAdulto) existing.intAdulto = intAdulto;
                        if (intMenor && !existing.intMenor) existing.intMenor = intMenor;
                        if (nacAdulto && !existing.nacAdulto) existing.nacAdulto = nacAdulto;
                        if (nacMenor && !existing.nacMenor) existing.nacMenor = nacMenor;

                        if (!existing.moneda && moneda) existing.moneda = moneda;
                        if (!existing.tc && tc) existing.tc = tc;

                        if (pasajeroVal && existing.pasajeroRaw && !existing.pasajeroRaw.toLowerCase().includes(pasajeroVal.toLowerCase())) {
                            existing.pasajeroRaw += ` / ${pasajeroVal}`;
                        }

                        notesList.forEach(n => {
                            if (n && !existing.notesList.includes(n)) {
                                existing.notesList.push(n);
                            }
                        });
                    } else {
                        toursMap.set(mapKey, {
                            id: i,
                            operador: op,
                            tour: tour,
                            pasajeroRaw: pasajeroVal,
                            moneda: moneda,
                            tc: tc,
                            intAdulto: intAdulto,
                            intMenor: intMenor,
                            nacAdulto: nacAdulto,
                            nacMenor: nacMenor,
                            notesList: notesList
                        });
                    }
                }

                const parsed = Array.from(toursMap.values());
                return parsed.length > 0 ? parsed : null;
            } catch (err) {
                console.error("Error parsing TSV:", err);
                return null;
            }
        }

        async function fetchSheetData(sheetUrl) {
            document.getElementById('resultsCountText').innerText = 'Cargando datos...';
            try {
                // Cache bust parameter to ensure published Google Sheet edits load fresh data immediately
                const fetchUrl = sheetUrl + (sheetUrl.includes('?') ? '&' : '?') + '_t=' + Date.now();
                const response = await fetch(fetchUrl);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const text = await response.text();
                const data = parseTSV(text);

                if (data && data.length > 0) {
                    allTours = data;
                } else {
                    throw new Error("Sin datos en la hoja");
                }
            } catch (err) {
                console.warn("Cargando datos locales de demostración:", err);
                allTours = [...fallbackCancunData];
            }

            populateDropdowns();
            applyFilters();
        }

        function populateDropdowns() {
            const operatorSelect = document.getElementById('filterOperator');
            const operators = [...new Set(allTours.map(t => t.operador))].sort();

            operatorSelect.innerHTML = '<option value="ALL">Todos los Operadores (' + operators.length + ')</option>';
            operators.forEach(op => {
                const count = allTours.filter(t => t.operador === op).length;
                operatorSelect.innerHTML += `<option value="${op}">${op} (${count})</option>`;
            });
        }

        function applyFilters() {
            const rawSearch = document.getElementById('searchInput').value;
            const searchVal = rawSearch.trim();
            const selectedOperator = document.getElementById('filterOperator').value;
            const sortBy = document.getElementById('sortBy').value;

            document.getElementById('clearSearchBtn').classList.toggle('hidden', searchVal === '');

            filteredTours = allTours.filter(item => {
                const matchesOperator = selectedOperator === 'ALL' || item.operador === selectedOperator;
                
                if (!matchesOperator) return false;
                if (!searchVal) return true;

                const scoreTour = getFuzzyScore(item.tour, searchVal);
                const scoreOp = getFuzzyScore(item.operador, searchVal);
                const scoreNotes = getFuzzyScore((item.notesList || []).join(' '), searchVal);

                item._fuzzyScore = Math.max(scoreTour, scoreOp, scoreNotes);
                return item._fuzzyScore > 25;
            });

            filteredTours.sort((a, b) => {
                if (searchVal !== '') {
                    const diffScore = (b._fuzzyScore || 0) - (a._fuzzyScore || 0);
                    if (Math.abs(diffScore) > 10) return diffScore;
                }

                if (sortBy === 'OPERATOR_ASC') {
                    const opCompare = a.operador.localeCompare(b.operador);
                    return opCompare !== 0 ? opCompare : a.tour.localeCompare(b.tour);
                } else if (sortBy === 'OPERATOR_DESC') {
                    const opCompare = b.operador.localeCompare(a.operador);
                    return opCompare !== 0 ? opCompare : b.tour.localeCompare(a.tour);
                } else if (sortBy === 'TOUR_ASC') {
                    return a.tour.localeCompare(b.tour);
                } else if (sortBy === 'TOUR_DESC') {
                    return b.tour.localeCompare(a.tour);
                }
                return 0;
            });

            updateStats();
            renderView();
        }

        function clearSearch() {
            document.getElementById('searchInput').value = '';
            applyFilters();
        }

        function updateStats() {
            document.getElementById('statTotalTours').innerText = filteredTours.length;
            document.getElementById('resultsCountText').innerText = `${filteredTours.length} actividades mostradas`;
        }

        function setViewMode(mode) {
            currentViewMode = mode;
            const btnList = document.getElementById('btnViewList');
            const btnGrid = document.getElementById('btnViewGrid');

            if (mode === 'list') {
                btnList.className = "px-2.5 py-1.5 rounded-md text-xs font-medium transition flex items-center gap-1.5 bg-white text-zinc-900 shadow-2xs";
                btnGrid.className = "px-2.5 py-1.5 rounded-md text-xs font-medium transition flex items-center gap-1.5 text-zinc-500 hover:text-zinc-900";
            } else {
                btnGrid.className = "px-2.5 py-1.5 rounded-md text-xs font-medium transition flex items-center gap-1.5 bg-white text-zinc-900 shadow-2xs";
                btnList.className = "px-2.5 py-1.5 rounded-md text-xs font-medium transition flex items-center gap-1.5 text-zinc-500 hover:text-zinc-900";
            }

            renderView();
        }

        function renderView() {
            const container = document.getElementById('mainViewContainer');

            if (filteredTours.length === 0) {
                container.innerHTML = `
                    <div class="bg-white rounded-xl p-8 text-center border border-zinc-200 my-4">
                        <p class="text-xs text-zinc-500">No se encontraron actividades que coincidan con la búsqueda.</p>
                    </div>
                `;
                return;
            }

            if (currentViewMode === 'list') {
                renderListView(container);
            } else {
                renderGridView(container);
            }
        }

        function renderListView(container) {
            const groups = {};
            filteredTours.forEach(tour => {
                if (!groups[tour.operador]) groups[tour.operador] = [];
                groups[tour.operador].push(tour);
            });

            let html = '';

            Object.keys(groups).forEach(operator => {
                const tours = groups[operator];
                html += `
                    <div class="bg-white rounded-xl border border-zinc-200 overflow-hidden shadow-2xs mb-4">
                        <div class="px-4 py-2.5 bg-zinc-100/80 border-b border-zinc-200 flex items-center justify-between">
                            <h2 class="text-xs font-bold text-zinc-800 tracking-wide uppercase">${operator}</h2>
                            <span class="text-[11px] text-zinc-400 font-medium">${tours.length}</span>
                        </div>
                        <div class="divide-y divide-zinc-100">
                `;

                tours.forEach(item => {
                    html += buildTourRowHtml(item);
                });

                html += `
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        function renderGridView(container) {
            let html = '<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">';

            filteredTours.forEach(item => {
                html += buildTourCardHtml(item);
            });

            html += '</div>';
            container.innerHTML = html;
        }

        function buildTourPricesHtml(item) {
            let pricesHtml = '';

            const defaultCurr = item.moneda || '';

            const intAd = formatPrice(item.intAdulto, defaultCurr);
            const intMn = formatPrice(item.intMenor, defaultCurr);

            const nacAd = formatPrice(item.nacAdulto, defaultCurr || 'MXN');
            const nacMn = formatPrice(item.nacMenor, defaultCurr || 'MXN');

            // Adult Price Block
            const hasAdult = intAd || nacAd;
            if (hasAdult) {
                let adultText = '';
                if (intAd && nacAd) {
                    if (intAd === nacAd) {
                        adultText = `<span class="font-medium text-zinc-900">${intAd}</span>`;
                    } else {
                        adultText = `
                            <span class="font-medium text-zinc-900">${intAd}</span>
                            <span class="font-medium text-zinc-900">${nacAd}</span>
                        `;
                    }
                } else {
                    adultText = `<span class="font-medium text-zinc-900">${intAd || nacAd}</span>`;
                }

                pricesHtml += `
                    <div class="flex flex-col text-xs">
                        <span class="text-[10px] text-zinc-400 uppercase font-semibold tracking-wider">Precio Adulto</span>
                        <div class="flex items-center gap-2 mt-0.5">
                            ${adultText}
                        </div>
                    </div>
                `;
            }

            // Child / Niño Price Block
            const hasChild = intMn || nacMn;
            if (hasChild) {
                let childText = '';
                if (intMn && nacMn) {
                    if (intMn === nacMn) {
                        childText = `<span class="font-medium text-zinc-800">${intMn}</span>`;
                    } else {
                        childText = `
                            <span class="font-medium text-zinc-800">${intMn}</span>
                            <span class="font-medium text-zinc-800">${nacMn}</span>
                        `;
                    }
                } else {
                    childText = `<span class="font-medium text-zinc-800">${intMn || nacMn}</span>`;
                }

                pricesHtml += `
                    <div class="flex flex-col text-xs">
                        <span class="text-[10px] text-zinc-400 uppercase font-semibold tracking-wider">Precio Niño</span>
                        <div class="flex items-center gap-2 mt-0.5">
                            ${childText}
                        </div>
                    </div>
                `;
            }

            // Exchange Rate
            if (!isInvalid(item.tc)) {
                pricesHtml += `
                    <div class="flex flex-col text-xs justify-center">
                        <span class="text-[10px] text-zinc-400 uppercase font-semibold tracking-wider">Tipo de Cambio</span>
                        <span class="font-medium text-zinc-700 mt-0.5">${item.tc}</span>
                    </div>
                `;
            }

            return pricesHtml;
        }

        function getPassengerBadgesHtml(item) {
            const rawPas = (item.pasajeroRaw || '').toLowerCase();
            const hasAdult = !isInvalid(item.intAdulto) || !isInvalid(item.nacAdulto) || rawPas.includes('adult');
            const hasChild = !isInvalid(item.intMenor) || !isInvalid(item.nacMenor) || rawPas.includes('menor') || rawPas.includes('niñ');

            let text = 'General';
            if (hasAdult && hasChild) {
                text = 'Adultos y Menores';
            } else if (hasAdult) {
                text = 'Adultos';
            } else if (hasChild) {
                text = 'Menores';
            }

            return `<span class="inline-flex items-center px-2 py-0.5 rounded-md text-[10px] font-semibold bg-zinc-100 text-zinc-700 border border-zinc-200/80 shrink-0"><i class="fa-solid fa-users text-[9px] mr-1 text-zinc-400"></i>${text}</span>`;
        }

        function buildNotesHtml(item) {
            const notes = (item.notesList || []).filter(n => n && !isInvalid(n));
            if (notes.length === 0) return '';

            return `<p class="text-[11px] text-zinc-500"><span class="font-semibold text-zinc-700">NOTA:</span> ${notes.join(' • ')}</p>`;
        }

        function buildTourRowHtml(item) {
            const prices = buildTourPricesHtml(item);
            const notes = buildNotesHtml(item);
            const badges = getPassengerBadgesHtml(item);

            return `
                <div onclick="openTourModal(${item.id})" class="p-4 hover:bg-zinc-50/80 transition flex flex-col gap-3 cursor-pointer group">
                    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-2">
                        <div class="flex items-center flex-wrap gap-2">
                            <h3 class="text-xs sm:text-sm font-bold text-zinc-900 group-hover:text-zinc-700 transition">${item.tour}</h3>
                            ${badges}
                        </div>
                    </div>

                    ${prices ? `<div class="flex flex-wrap items-center gap-5 pt-1">${prices}</div>` : ''}

                    ${notes ? `<div class="pt-2 border-t border-zinc-100">${notes}</div>` : ''}
                </div>
            `;
        }

        function buildTourCardHtml(item) {
            const prices = buildTourPricesHtml(item);
            const notes = buildNotesHtml(item);
            const badges = getPassengerBadgesHtml(item);

            return `
                <div onclick="openTourModal(${item.id})" class="bg-white rounded-xl border border-zinc-200 p-4 shadow-2xs flex flex-col justify-between space-y-3.5 hover:border-zinc-300 hover:shadow-md transition cursor-pointer group">
                    <div class="space-y-2.5">
                        <div class="flex items-center justify-between gap-2">
                            <span class="text-[10px] font-bold text-zinc-500 uppercase tracking-wider bg-zinc-100 px-2 py-0.5 rounded">${item.operador}</span>
                            ${badges}
                        </div>

                        <h3 class="text-xs sm:text-sm font-bold text-zinc-900 leading-snug group-hover:text-zinc-700 transition">${item.tour}</h3>
                    </div>

                    ${prices ? `<div class="pt-3 border-t border-zinc-100 flex flex-wrap items-center gap-4">${prices}</div>` : ''}

                    ${notes ? `<div class="pt-2 border-t border-zinc-100">${notes}</div>` : ''}
                </div>
            `;
        }

        function openTourModal(id) {
            const item = allTours.find(t => t.id === id);
            if (!item) return;

            const modal = document.getElementById('tourDetailModal');
            const body = document.getElementById('modalBody');

            const defaultCurr = item.moneda || '';
            const intAd = formatPrice(item.intAdulto, defaultCurr);
            const intMn = formatPrice(item.intMenor, defaultCurr);
            const nacAd = formatPrice(item.nacAdulto, defaultCurr || 'MXN');
            const nacMn = formatPrice(item.nacMenor, defaultCurr || 'MXN');
            const notes = (item.notesList || []).filter(n => n && !isInvalid(n));
            const badges = getPassengerBadgesHtml(item);

            body.innerHTML = `
                <div class="space-y-4">
                    <div>
                        <span class="text-[10px] font-bold text-zinc-500 uppercase tracking-wider bg-zinc-100 px-2.5 py-1 rounded-md border border-zinc-200/80 inline-block mb-2">${item.operador}</span>
                        <h2 class="text-base sm:text-lg font-bold text-zinc-900 leading-snug">${item.tour}</h2>
                        <div class="mt-2">${badges}</div>
                    </div>

                    <div class="bg-zinc-50/80 p-4 rounded-xl border border-zinc-200/80 space-y-3">
                        <h3 class="text-[10px] font-bold text-zinc-400 uppercase tracking-wider">Detalle de Precios</h3>
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                            ${(intAd || nacAd) ? `
                                <div class="bg-white p-3 rounded-lg border border-zinc-200">
                                    <span class="text-[10px] text-zinc-400 font-semibold uppercase tracking-wider block">Precio Adulto</span>
                                    <div class="text-sm font-bold text-zinc-900 mt-1 flex flex-wrap gap-2">
                                        ${intAd ? `<span>${intAd}</span>` : ''}
                                        ${nacAd && nacAd !== intAd ? `<span>${nacAd}</span>` : ''}
                                    </div>
                                </div>
                            ` : ''}
                            
                            ${(intMn || nacMn) ? `
                                <div class="bg-white p-3 rounded-lg border border-zinc-200">
                                    <span class="text-[10px] text-zinc-400 font-semibold uppercase tracking-wider block">Precio Niño</span>
                                    <div class="text-sm font-bold text-zinc-900 mt-1 flex flex-wrap gap-2">
                                        ${intMn ? `<span>${intMn}</span>` : ''}
                                        ${nacMn && nacMn !== intMn ? `<span>${nacMn}</span>` : ''}
                                    </div>
                                </div>
                            ` : ''}
                        </div>

                        ${!isInvalid(item.tc) ? `
                            <div class="text-xs text-zinc-600 pt-1">
                                <span class="font-semibold text-zinc-700">Tipo de cambio:</span> ${item.tc}
                            </div>
                        ` : ''}
                    </div>

                    ${notes.length > 0 ? `
                        <div class="bg-zinc-100/80 p-3.5 rounded-xl border border-zinc-200 text-xs text-zinc-700 space-y-1">
                            <span class="font-bold text-zinc-800 uppercase text-[10px] tracking-wider block">NOTA:</span>
                            <p class="leading-relaxed text-zinc-600">${notes.join(' • ')}</p>
                        </div>
                    ` : ''}

                    <div class="pt-2 flex justify-end">
                        <button onclick="closeTourModal()" class="px-4 py-2 bg-zinc-900 text-white rounded-lg text-xs font-semibold hover:bg-zinc-800 transition">
                            Cerrar
                        </button>
                    </div>
                </div>
            `;

            modal.classList.remove('hidden');
            document.body.classList.add('overflow-hidden');
        }

        function closeTourModal() {
            const modal = document.getElementById('tourDetailModal');
            modal.classList.add('hidden');
            document.body.classList.remove('overflow-hidden');
        }

        function handleBackdropClick(event) {
            if (event.target.id === 'tourDetailModal') {
                closeTourModal();
            }
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeTourModal();
            }
        });

        window.onload = function() {
            fetchSheetData(DEFAULT_SHEET_URL);
        };
    </script>
</body>
</html>
