    <script>
        const DEFAULT_SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTRgSNzAQ8irxoShAvGMtNHeRGQz-HPDmFfUC9dqcLQtDSBp0jQMrIgt8WeGgqB1JDpsMMEkue1YBGm/pub?output=tsv";
        
        let allTours = [];
        let filteredTours = [];
        let currentViewMode = 'list'; // 'list' or 'grid'

        // String Normalization & Smart Fuzzy Match Analysis
        function normalizeStr(str) {
            if (!str) return '';
            return str.toString()
                .toLowerCase()
                .normalize('NFD')
                .replace(/[\u0300-\u036f]/g, '')
                .replace(/[^a-z0-9\s]/g, '')
                .trim();
        }

        function levenshtein(a, b) {
            if (a.length === 0) return b.length;
            if (b.length === 0) return a.length;
            const matrix = [];
            for (let i = 0; i <= b.length; i++) matrix[i] = [i];
            for (let j = 0; j <= a.length; j++) matrix[0][j] = j;
            for (let i = 1; i <= b.length; i++) {
                for (let j = 1; j <= a.length; j++) {
                    if (b.charAt(i - 1) === a.charAt(j - 1)) {
                        matrix[i][j] = matrix[i - 1][j - 1];
                    } else {
                        matrix[i][j] = Math.min(
                            matrix[i - 1][j - 1] + 1,
                            matrix[i][j - 1] + 1,
                            matrix[i - 1][j] + 1
                        );
                    }
                }
            }
            return matrix[b.length][a.length];
        }

        function getFuzzyScore(text, query) {
            const normText = normalizeStr(text);
            const normQuery = normalizeStr(query);
            if (!normQuery) return 100;
            if (!normText) return 0;

            // Direct substring match
            if (normText.includes(normQuery)) return 100;

            const queryWords = normQuery.split(/\s+/);
            const textWords = normText.split(/\s+/);
            let matchedWords = 0;

            for (const qWord of queryWords) {
                if (!qWord) continue;
                let foundMatch = false;
                for (const tWord of textWords) {
                    if (tWord.includes(qWord) || qWord.includes(tWord)) {
                        foundMatch = true;
                        break;
                    }
                    if (qWord.length > 2 && levenshtein(qWord, tWord) <= 2) {
                        foundMatch = true;
                        break;
                    }
                }
                if (foundMatch) matchedWords++;
            }

            return queryWords.length > 0 ? (matchedWords / queryWords.length) * 80 : 0;
        }

        // Fallback Data
        const fallbackCancunData = [
            { id: 1, operador: "Grupo Xcaret", tour: "Xcaret Plus con Transportación", intAdulto: "189 USD", intMenor: "142 USD", nacAdulto: "2,990 MXN", nacMenor: "2,240 MXN", moneda: "", tc: "", nota1: "Incluye comida buffet y equipo de snorkel.", nota2: "Transportación redonda incluida." },
            { id: 2, operador: "Grupo Xcaret", tour: "Xel-Há All Inclusive", intAdulto: "139 USD", intMenor: "104 USD", nacAdulto: "2,200 MXN", nacMenor: "1,650 MXN", moneda: "", tc: "", nota1: "Barra libre nacional y snorkel ilimitado.", nota2: "" },
            { id: 3, operador: "Grupo Xcaret", tour: "Xplor Fuego Nocturno", intAdulto: "129 USD", intMenor: "97 USD", nacAdulto: "", nacMenor: "", moneda: "USD", tc: "", nota1: "Incluye tirolesas nocturnas y buffet.", nota2: "" },
            { id: 4, operador: "Grupo Xcaret", tour: "Xenotes Oasis Maya", intAdulto: "159 USD", intMenor: "", nacAdulto: "", nacMenor: "", moneda: "USD", tc: "", nota1: "Edad mínima 6 años.", nota2: "" },
            
            { id: 5, operador: "Aquaworld Cancún", tour: "Jungle Tour Express (Speedboat & Snorkel MUSA)", intAdulto: "75 USD", intMenor: "50 USD", nacAdulto: "1,200 MXN", nacMenor: "800 MXN", moneda: "", tc: "20.00", nota1: "Impuesto de muelle no incluido $20 USD.", nota2: "" },
            { id: 6, operador: "Aquaworld Cancún", tour: "Snorkel en Museo Subacuático MUSA", intAdulto: "52 USD", intMenor: "38 USD", nacAdulto: "", nacMenor: "", moneda: "USD", tc: "", nota1: "Impuesto de muelle $20 USD no incluido.", nota2: "" },
            { id: 7, operador: "Aquaworld Cancún", tour: "Waverunner Jet Ski 30 min", intAdulto: "85 USD", intMenor: "", nacAdulto: "1,550 MXN", nacMenor: "", moneda: "", tc: "", nota1: "Impuesto muelle $15 USD no incluido.", nota2: "" },

            { id: 8, operador: "Marina Sunrise", tour: "Catamarán a Isla Mujeres VIP", intAdulto: "89 USD", intMenor: "65 USD", nacAdulto: "1,600 MXN", nacMenor: "1,150 MXN", moneda: "", tc: "", nota1: "Open bar a bordo y comida buffet en club de playa.", nota2: "Impuesto de muelle $20 USD por persona." },
            { id: 9, operador: "Marina Sunrise", tour: "Isla Contoy & Isla Mujeres", intAdulto: "135 USD", intMenor: "99 USD", nacAdulto: "", nacMenor: "", moneda: "USD", tc: "", nota1: "Impuesto de muelle y parque natural $20 USD.", nota2: "Cupo limitado por día." },

            { id: 10, operador: "Cancún Passion", tour: "Chichén Itzá Deluxe, Cenote & Valladolid", intAdulto: "109 USD", intMenor: "85 USD", nacAdulto: "1,850 MXN", nacMenor: "1,400 MXN", moneda: "", tc: "", nota1: "Entrada CULTUR y buffet incluidos.", nota2: "" },
            { id: 11, operador: "Cancún Passion", tour: "Tulum Express & Cenote Zací", intAdulto: "79 USD", intMenor: "60 USD", nacAdulto: "", nacMenor: "", moneda: "USD", tc: "", nota1: "Guía certificado incluido.", nota2: "" },

            { id: 12, operador: "Captain Hook", tour: "Cena Show Pirata Capitán Hook", intAdulto: "110 USD", intMenor: "55 USD", nacAdulto: "2,000 MXN", nacMenor: "1,000 MXN", moneda: "", tc: "", nota1: "Impuesto de muelle $20 USD no incluido.", nota2: "" },

            { id: 13, operador: "Safe Transfers", tour: "Traslado Privado Aeropuerto -> Zona Hotelera (Redondo)", intAdulto: "65 USD", intMenor: "", nacAdulto: "1,200 MXN", nacMenor: "", moneda: "", tc: "", nota1: "Capacidad hasta 8 pasajeros.", nota2: "Servicio privado 24/7." }
        ];

        function isInvalid(val) {
            if (val === null || val === undefined) return true;
            const str = val.toString().trim().toLowerCase();
            if (str === '' || str === 'n/a' || str === 'na' || str === '-' || str === 'null' || str === 'undefined') return true;

            // Si la columna contiene 0 o $0 (con o sin USD/MXN), se considera vacía
            const cleanNum = str.replace(/[\$\,]/g, '').replace(/\b(usd|mxn)\b/g, '').trim();
            if (cleanNum === '0' || cleanNum === '0.00' || cleanNum === '0.0' || (!isNaN(parseFloat(cleanNum)) && parseFloat(cleanNum) === 0)) {
                return true;
            }

            return false;
        }

        function cleanVal(val) {
            if (isInvalid(val)) return '';
            return val.toString().trim();
        }

        function formatPrice(val, defaultCurrency = '') {
            if (isInvalid(val)) return '';
            let str = val.toString().trim();
            if (!str.includes('$') && !isNaN(parseFloat(str.replace(/,/g, '')))) {
                str = '$' + str;
            }
            const upperStr = str.toUpperCase();
            if (defaultCurrency && !upperStr.includes('USD') && !upperStr.includes('MXN')) {
                str += ' ' + defaultCurrency.toUpperCase();
            }
            return str;
        }

        function parseTSV(tsvText) {
            try {
                const lines = tsvText.split(/\r?\n/).filter(line => line.trim() !== '');
                if (lines.length < 2) return null;

                const headers = lines[0].split('\t').map(h => h.trim().toLowerCase());

                const findIdx = (keywords) => headers.findIndex(h => keywords.some(k => h.includes(k)));

                const idxOp = findIdx(['operador', 'operator', 'empresa', 'proveedor']);
                const idxTour = findIdx(['tour', 'parque', 'servicio', 'actividad', 'nombre', 'producto']);
                const idxPasajero = findIdx(['tipo de pasajero', 'pasajero', 'tipo pasajero', 'categoria pasajero', 'tipo']);
                
                const idxIntAdulto = findIdx(['int adulto', 'extranjero adulto', 'internacional adulto', 'precio int adulto']);
                const idxIntMenor = findIdx(['int menor', 'int niño', 'extranjero menor', 'internacional menor', 'precio int menor']);
                const idxIntGen = findIdx(['precio internacional', 'internacional', 'precio int', 'extranjero']);

                const idxNacAdulto = findIdx(['nac adulto', 'mexicano adulto', 'nacional adulto', 'precio nac adulto']);
                const idxNacMenor = findIdx(['nac menor', 'nac niño', 'mexicano menor', 'nacional menor', 'precio nac menor']);
                const idxNacGen = findIdx(['precio nacional', 'nacional', 'precio nac', 'mexicano']);

                const idxAdulto = findIdx(['adulto', 'adult']);
                const idxMenor = findIdx(['menor', 'niño', 'child']);

                const idxMoneda = findIdx(['moneda', 'currency']);
                const idxTC = findIdx(['tipo de cambio', 'tc', 'exchange']);

                const idxNota1 = findIdx(['nota 1', 'notas 1', 'nota1', 'notas1']);
                const idxNota2 = findIdx(['nota 2', 'notas 2', 'nota2', 'notas2']);
                const idxNotaGen = findIdx(['nota', 'notas', 'observacion', 'observaciones', 'impuesto']);

                const toursMap = new Map();

                for (let i = 1; i < lines.length; i++) {
                    const cols = lines[i].split('\t').map(c => c.trim().replace(/^"|"$/g, ''));
                    if (cols.length === 0 || !cols[0]) continue;

                    const op = cleanVal((idxOp >= 0 && cols[idxOp]) ? cols[idxOp] : cols[0]) || 'Operador';
                    const tour = cleanVal((idxTour >= 0 && cols[idxTour]) ? cols[idxTour] : cols[1]);

                    if (!tour) continue;

                    const pasajeroVal = cleanVal(idxPasajero >= 0 ? cols[idxPasajero] : '');
                    const moneda = cleanVal(idxMoneda >= 0 ? cols[idxMoneda] : '');
                    const tc = cleanVal(idxTC >= 0 ? cols[idxTC] : '');

                    let intAdulto = cleanVal(idxIntAdulto >= 0 ? cols[idxIntAdulto] : '');
                    let intMenor = cleanVal(idxIntMenor >= 0 ? cols[idxIntMenor] : '');
                    const intGen = cleanVal(idxIntGen >= 0 ? cols[idxIntGen] : '');

                    let nacAdulto = cleanVal(idxNacAdulto >= 0 ? cols[idxNacAdulto] : '');
                    let nacMenor = cleanVal(idxNacMenor >= 0 ? cols[idxNacMenor] : '');
                    const nacGen = cleanVal(idxNacGen >= 0 ? cols[idxNacGen] : '');

                    const genAdulto = cleanVal(idxAdulto >= 0 ? cols[idxAdulto] : '');
                    const genMenor = cleanVal(idxMenor >= 0 ? cols[idxMenor] : '');

                    // Match passenger types
                    const isAdultOnly = pasajeroVal.toLowerCase().includes('adult');
                    const isChildOnly = pasajeroVal.toLowerCase().includes('menor') || pasajeroVal.toLowerCase().includes('niñ');

                    if (isAdultOnly) {
                        if (!intAdulto && intGen) intAdulto = intGen;
                        if (!intAdulto && genAdulto) intAdulto = genAdulto;
                        if (!nacAdulto && nacGen) nacAdulto = nacGen;
                    } else if (isChildOnly) {
                        if (!intMenor && intGen) intMenor = intGen;
                        if (!intMenor && genMenor) intMenor = genMenor;
                        if (!nacMenor && nacGen) nacMenor = nacGen;
                    } else {
                        if (!intAdulto && intGen) intAdulto = intGen;
                        if (!intAdulto && genAdulto) intAdulto = genAdulto;
                        if (!intMenor && genMenor) intMenor = genMenor;
                        if (!nacAdulto && nacGen) nacAdulto = nacGen;
                        if (!nacAdulto && genAdulto) nacAdulto = genAdulto;
                        if (!nacMenor && nacGen) nacMenor = nacGen;
                    }

                    let n1 = cleanVal(idxNota1 >= 0 ? cols[idxNota1] : '');
                    let n2 = cleanVal(idxNota2 >= 0 ? cols[idxNota2] : '');
                    if (!n1 && !n2 && idxNotaGen >= 0) {
                        n1 = cleanVal(cols[idxNotaGen]);
                    }

                    // Key to match Tour / Parque under Operador into one unified entry
                    const mapKey = `${op.toLowerCase()}:::${tour.toLowerCase()}`;

                    if (toursMap.has(mapKey)) {
                        const existing = toursMap.get(mapKey);
                        if (!existing.intAdulto && intAdulto) existing.intAdulto = intAdulto;
                        if (!existing.intMenor && intMenor) existing.intMenor = intMenor;
                        if (!existing.nacAdulto && nacAdulto) existing.nacAdulto = nacAdulto;
                        if (!existing.nacMenor && nacMenor) existing.nacMenor = nacMenor;
                        if (!existing.moneda && moneda) existing.moneda = moneda;
                        if (!existing.tc && tc) existing.tc = tc;
                        if (pasajeroVal && !existing.pasajeroRaw.toLowerCase().includes(pasajeroVal.toLowerCase())) {
                            existing.pasajeroRaw += (existing.pasajeroRaw ? ', ' : '') + pasajeroVal;
                        }
                        if (n1 && !existing.nota1.includes(n1)) existing.nota1 = existing.nota1 ? `${existing.nota1} • ${n1}` : n1;
                        if (n2 && !existing.nota2.includes(n2)) existing.nota2 = existing.nota2 ? `${existing.nota2} • ${n2}` : n2;
                    } else {
                        toursMap.set(mapKey, {
                            id: i,
                            operador: op,
                            tour: tour,
                            pasajeroRaw: pasajeroVal,
                            moneda: moneda,
                            tc: tc,
                            intAdulto: intAdulto,
                            intMenor: intMenor,
                            nacAdulto: nacAdulto,
                            nacMenor: nacMenor,
                            nota1: n1,
                            nota2: n2
                        });
                    }
                }

                const parsed = Array.from(toursMap.values());
                return parsed.length > 0 ? parsed : null;
            } catch (err) {
                console.error("Error parsing TSV:", err);
                return null;
            }
        }

        async function fetchSheetData(sheetUrl) {
            document.getElementById('resultsCountText').innerText = 'Cargando datos...';
            try {
                const response = await fetch(sheetUrl);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const text = await response.text();
                const data = parseTSV(text);

                if (data && data.length > 0) {
                    allTours = data;
                } else {
                    throw new Error("Sin datos en la hoja");
                }
            } catch (err) {
                console.warn("Cargando datos locales de demostración:", err);
                allTours = [...fallbackCancunData];
            }

            populateDropdowns();
            applyFilters();
        }

        function populateDropdowns() {
            const operatorSelect = document.getElementById('filterOperator');
            const operators = [...new Set(allTours.map(t => t.operador))].sort();

            operatorSelect.innerHTML = '<option value="ALL">Todos los Operadores (' + operators.length + ')</option>';
            operators.forEach(op => {
                const count = allTours.filter(t => t.operador === op).length;
                operatorSelect.innerHTML += `<option value="${op}">${op} (${count})</option>`;
            });
        }

        function applyFilters() {
            const rawSearch = document.getElementById('searchInput').value;
            const searchVal = rawSearch.trim();
            const selectedOperator = document.getElementById('filterOperator').value;
            const sortBy = document.getElementById('sortBy').value;

            document.getElementById('clearSearchBtn').classList.toggle('hidden', searchVal === '');

            // Filtering with Smart Fuzzy Match Analysis
            filteredTours = allTours.filter(item => {
                const matchesOperator = selectedOperator === 'ALL' || item.operador === selectedOperator;
                
                if (!matchesOperator) return false;
                if (!searchVal) return true;

                const scoreTour = getFuzzyScore(item.tour, searchVal);
                const scoreOp = getFuzzyScore(item.operador, searchVal);
                const scoreN1 = getFuzzyScore(item.nota1, searchVal);
                const scoreN2 = getFuzzyScore(item.nota2, searchVal);

                item._fuzzyScore = Math.max(scoreTour, scoreOp, scoreN1, scoreN2);
                return item._fuzzyScore > 25;
            });

            // Sorting logic
            filteredTours.sort((a, b) => {
                // Prioritize fuzzy relevance if actively searching
                if (searchVal !== '') {
                    const diffScore = (b._fuzzyScore || 0) - (a._fuzzyScore || 0);
                    if (Math.abs(diffScore) > 10) return diffScore;
                }

                if (sortBy === 'OPERATOR_ASC') {
                    const opCompare = a.operador.localeCompare(b.operador);
                    return opCompare !== 0 ? opCompare : a.tour.localeCompare(b.tour);
                } else if (sortBy === 'OPERATOR_DESC') {
                    const opCompare = b.operador.localeCompare(a.operador);
                    return opCompare !== 0 ? opCompare : b.tour.localeCompare(a.tour);
                } else if (sortBy === 'TOUR_ASC') {
                    return a.tour.localeCompare(b.tour);
                } else if (sortBy === 'TOUR_DESC') {
                    return b.tour.localeCompare(a.tour);
                }
                return 0;
            });

            updateStats();
            renderView();
        }

        function clearSearch() {
            document.getElementById('searchInput').value = '';
            applyFilters();
        }

        function updateStats() {
            document.getElementById('statTotalTours').innerText = filteredTours.length;
            document.getElementById('resultsCountText').innerText = `${filteredTours.length} actividades mostradas`;
        }

        function setViewMode(mode) {
            currentViewMode = mode;
            const btnList = document.getElementById('btnViewList');
            const btnGrid = document.getElementById('btnViewGrid');

            if (mode === 'list') {
                btnList.className = "px-2.5 py-1.5 rounded-md text-xs font-medium transition flex items-center gap-1.5 bg-white text-zinc-900 shadow-2xs";
                btnGrid.className = "px-2.5 py-1.5 rounded-md text-xs font-medium transition flex items-center gap-1.5 text-zinc-500 hover:text-zinc-900";
            } else {
                btnGrid.className = "px-2.5 py-1.5 rounded-md text-xs font-medium transition flex items-center gap-1.5 bg-white text-zinc-900 shadow-2xs";
                btnList.className = "px-2.5 py-1.5 rounded-md text-xs font-medium transition flex items-center gap-1.5 text-zinc-500 hover:text-zinc-900";
            }

            renderView();
        }

        function renderView() {
            const container = document.getElementById('mainViewContainer');

            if (filteredTours.length === 0) {
                container.innerHTML = `
                    <div class="bg-white rounded-xl p-8 text-center border border-zinc-200 my-4">
                        <p class="text-xs text-zinc-500">No se encontraron actividades que coincidan con la búsqueda.</p>
                    </div>
                `;
                return;
            }

            if (currentViewMode === 'list') {
                renderListView(container);
            } else {
                renderGridView(container);
            }
        }

        function renderListView(container) {
            const groups = {};
            filteredTours.forEach(tour => {
                if (!groups[tour.operador]) groups[tour.operador] = [];
                groups[tour.operador].push(tour);
            });

            let html = '';

            Object.keys(groups).forEach(operator => {
                const tours = groups[operator];
                html += `
                    <div class="bg-white rounded-xl border border-zinc-200 overflow-hidden shadow-2xs mb-4">
                        <div class="px-4 py-2.5 bg-zinc-100/80 border-b border-zinc-200 flex items-center justify-between">
                            <h2 class="text-xs font-bold text-zinc-800 tracking-wide uppercase">${operator}</h2>
                            <span class="text-[11px] text-zinc-400 font-medium">${tours.length}</span>
                        </div>
                        <div class="divide-y divide-zinc-100">
                `;

                tours.forEach(item => {
                    html += buildTourRowHtml(item);
                });

                html += `
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        function renderGridView(container) {
            let html = '<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">';

            filteredTours.forEach(item => {
                html += buildTourCardHtml(item);
            });

            html += '</div>';
            container.innerHTML = html;
        }

        function buildTourPricesHtml(item) {
            let pricesHtml = '';

            const defaultCurr = item.moneda || '';

            const intAd = formatPrice(item.intAdulto, defaultCurr);
            const intMn = formatPrice(item.intMenor, defaultCurr);

            const nacAd = formatPrice(item.nacAdulto, defaultCurr || 'MXN');
            const nacMn = formatPrice(item.nacMenor, defaultCurr || 'MXN');

            // International Block
            if (intAd || intMn) {
                pricesHtml += `
                    <div class="flex flex-col text-xs">
                        <span class="text-[10px] text-zinc-400 uppercase font-semibold">Precio Internacional</span>
                        <div class="flex items-center gap-2.5 mt-0.5">
                            ${intAd ? `<span class="font-medium text-zinc-900"><span class="text-[10px] text-zinc-500 font-normal">Costo Adulto:</span> ${intAd}</span>` : ''}
                            ${intMn ? `<span class="text-zinc-700"><span class="text-[10px] text-zinc-500 font-normal">Costo Menor:</span> ${intMn}</span>` : ''}
                        </div>
                    </div>
                `;
            }

            // National Block
            if (nacAd || nacMn) {
                pricesHtml += `
                    <div class="flex flex-col text-xs">
                        <span class="text-[10px] text-zinc-400 uppercase font-semibold">Precio Nacional</span>
                        <div class="flex items-center gap-2.5 mt-0.5">
                            ${nacAd ? `<span class="font-medium text-zinc-900"><span class="text-[10px] text-zinc-500 font-normal">Costo Adulto:</span> ${nacAd}</span>` : ''}
                            ${nacMn ? `<span class="text-zinc-700"><span class="text-[10px] text-zinc-500 font-normal">Costo Menor:</span> ${nacMn}</span>` : ''}
                        </div>
                    </div>
                `;
            }

            // Exchange Rate
            if (!isInvalid(item.tc)) {
                pricesHtml += `
                    <div class="flex flex-col text-xs justify-center">
                        <span class="text-[10px] text-zinc-400 uppercase font-semibold">Tipo de Cambio</span>
                        <span class="font-medium text-zinc-700 mt-0.5">${item.tc}</span>
                    </div>
                `;
            }

            return pricesHtml;
        }

        // Helper to generate passenger badges next to tour name
        function getPassengerBadgesHtml(item) {
            const rawPas = (item.pasajeroRaw || '').toLowerCase();
            const hasAdult = !isInvalid(item.intAdulto) || !isInvalid(item.nacAdulto) || rawPas.includes('adult');
            const hasChild = !isInvalid(item.intMenor) || !isInvalid(item.nacMenor) || rawPas.includes('menor') || rawPas.includes('niñ');

            let text = 'General';
            if (hasAdult && hasChild) {
                text = 'Adultos y Menores';
            } else if (hasAdult) {
                text = 'Adultos';
            } else if (hasChild) {
                text = 'Menores';
            }

            return `<span class="inline-flex items-center px-2 py-0.5 rounded-md text-[10px] font-semibold bg-zinc-100 text-zinc-700 border border-zinc-200/80 shrink-0"><i class="fa-solid fa-users text-[9px] mr-1 text-zinc-400"></i>${text}</span>`;
        }

        // Integrated Notes Generator (Nota 1 + Nota 2 combined under NOTA:)
        function buildNotesHtml(item) {
            const n1 = cleanVal(item.nota1);
            const n2 = cleanVal(item.nota2);
            const notesArray = [n1, n2].filter(n => n && !isInvalid(n));

            if (notesArray.length === 0) return '';

            return `<p class="text-[11px] text-zinc-500"><span class="font-semibold text-zinc-700">NOTA:</span> ${notesArray.join(' • ')}</p>`;
        }

        // List row generator - unified single box layout
        function buildTourRowHtml(item) {
            const prices = buildTourPricesHtml(item);
            const notes = buildNotesHtml(item);
            const badges = getPassengerBadgesHtml(item);

            return `
                <div class="p-4 hover:bg-zinc-50/50 transition flex flex-col gap-3">
                    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-2">
                        <div class="flex items-center flex-wrap gap-2">
                            <h3 class="text-xs sm:text-sm font-bold text-zinc-900">${item.tour}</h3>
                            ${badges}
                        </div>
                    </div>

                    <!-- Prices section (rendered only if price data exists) -->
                    ${prices ? `<div class="flex flex-wrap items-center gap-5 pt-1">${prices}</div>` : ''}

                    <!-- Integrated Notes -->
                    ${notes ? `<div class="pt-2 border-t border-zinc-100">${notes}</div>` : ''}
                </div>
            `;
        }

        // Grid card generator - unified single box layout
        function buildTourCardHtml(item) {
            const prices = buildTourPricesHtml(item);
            const notes = buildNotesHtml(item);
            const badges = getPassengerBadgesHtml(item);

            return `
                <div class="bg-white rounded-xl border border-zinc-200 p-4 shadow-2xs flex flex-col justify-between space-y-3.5 hover:border-zinc-300 transition">
                    <div class="space-y-2.5">
                        <!-- Operator Badge & Passenger Types -->
                        <div class="flex items-center justify-between gap-2">
                            <span class="text-[10px] font-bold text-zinc-500 uppercase tracking-wider bg-zinc-100 px-2 py-0.5 rounded">${item.operador}</span>
                            ${badges}
                        </div>

                        <h3 class="text-xs sm:text-sm font-bold text-zinc-900 leading-snug">${item.tour}</h3>
                    </div>

                    <!-- Prices (rendered only if price data exists) -->
                    ${prices ? `<div class="pt-3 border-t border-zinc-100 flex flex-wrap items-center gap-4">${prices}</div>` : ''}

                    <!-- Integrated Notes -->
                    ${notes ? `<div class="pt-2 border-t border-zinc-100">${notes}</div>` : ''}
                </div>
            `;
        }

        window.onload = function() {
            fetchSheetData(DEFAULT_SHEET_URL);
        };
    </script>
</body>
</html>
